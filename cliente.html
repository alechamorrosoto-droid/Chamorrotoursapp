  <title>Casas del Caribe · Tour Details</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070f16; font-family: -apple-system, 'Inter', system-ui, sans-serif; color: #e8f4f8; min-height: 100vh; padding-bottom: 40px; }
    .logo-card { background: #f5f5f5; padding: 28px 20px 20px; display: flex; justify-content: center; }
    .logo-card img { max-width: 260px; width: 100%; height: auto; }
    .header { padding: 20px 16px 8px; text-align: center; }
    .header h1 { font-size: 19px; font-weight: 800; color: #e8f4f8; margin-bottom: 6px; }
    .header p { font-size: 13px; color: #7ec8e3; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 12px 16px; }
    .intro { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; text-align: center; }
    label { font-size: 11px; color: #7ec8e3; display: block; margin-bottom: 4px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    label .req { color: #f87171; }
    input, select, textarea { width: 100%; background: #0f2027; border: 1px solid #2d5a80; border-radius: 8px; padding: 11px 12px; color: #e8f4f8; font-size: 15px; font-family: inherit; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #0ea5e9; }
    textarea { min-height: 80px; resize: vertical; }
    .btn { width: 100%; margin-top: 24px; background: linear-gradient(135deg,#0ea5e9,#0369a1); color: #fff; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: 0.5; }
    .ok { display: none; text-align: center; padding: 60px 20px; }
    .ok .ico { font-size: 52px; margin-bottom: 16px; }
    .ok h2 { font-size: 19px; margin-bottom: 8px; }
    .ok p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .err { display: none; background: #2a1215; border: 1px solid #7f1d1d; color: #f87171; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 14px; }
    .aviso { background: #0f2027; border: 1px solid #2d5a80; color: #7ec8e3; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 20px; text-align: center; line-height: 1.5; }
  </style>

  <div class="header">
    <h1>🌊 Tour Details</h1>
    <p>Chamorro Tours</p>
  </div>

  <div class="wrap">
    <div id="form-pane">
      <p class="intro">Please complete the information below so we can have everything ready for your tour.</p>
      <div id="info-tour" class="aviso" style="display:none; text-align:left; background:#0a1e2a; border-color:#0ea5e9; color:#e8f4f8; line-height:1.7;"></div>
      <div id="sin-id" class="aviso" style="display:none;">This link seems to be missing some information. Please request a new link.</div>

      <div id="campos">
        <label>Main guest name <span class="req">*</span></label>
        <input type="text" id="huesped" placeholder="e.g. John Smith" />

        <label>Phone / WhatsApp (for day-of coordination)</label>
        <input type="text" id="contacto" placeholder="e.g. +1 555 123 4567" />

        <label>Which tour would you like?</label>
        <select id="tour" onchange="actualizarCamposCondicionales(); actualizarPrecioEstimado(); actualizarQueTraer();">
          <option value="">Not decided yet</option>
          <option value="kayaking">🚣 Kayaking</option>
          <option value="dolphin">🐬 Dolphin Tour</option>
          <option value="snorkeling">🤿 Snorkeling</option>
          <option value="chocolate">🍫 Chocolate & Waterfalls</option>
          <option value="atv1">🏍 ATV – 1 Waterfall + Chocolate Tour</option>
          <option value="atv2">🏍 ATV – 2 Waterfalls</option>
        </select>

        <div id="precio-estimado" style="display:none; background:#0d2818; border:1px solid #1e5631; color:#4ade80; border-radius:8px; padding:11px 12px; font-size:13px; margin-top:12px; font-weight:600;"></div>
        <div id="que-traer" style="display:none; background:#0f2027; border:1px solid #2d5a80; color:#e8f4f8; border-radius:8px; padding:12px 14px; font-size:13px; margin-top:12px;"></div>

        <label>Number of guests</label>
        <input type="number" id="pax" min="1" placeholder="e.g. 4" oninput="actualizarPrecioEstimado()" />

        <label>Ages of the group</label>
        <input type="text" id="edades" placeholder="e.g. 2 adults, kids age 8 and 12" />

        <div id="campo-nadar" style="display:none;">
          <label>Swimming ability</label>
          <select id="nadar">
            <option value="">Select an option</option>
            <option value="Comfortable swimmer">Comfortable swimmer</option>
            <option value="Some experience">Some experience</option>
            <option value="Cannot swim">Cannot swim</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>

        <div id="campo-peso" style="display:none;">
          <label>Approximate weight of riders (helps us assign quads safely)</label>
          <input type="text" id="peso" placeholder="e.g. 3 around 70kg, 1 around 100kg" />
        </div>

        <label>Preferred language</label>
        <select id="idioma">
          <option>English</option>
          <option>Español</option>
          <option>Português</option>
          <option>Français</option>
          <option>Other</option>
        </select>

        <label>🚨 Allergies</label>
        <input type="text" id="alergias" placeholder="None known" />

        <label>Dietary preferences</label>
        <input type="text" id="preferencias" placeholder="Vegetarian, gluten-free, etc." />

        <label>Anything else we should know?</label>
        <textarea id="notas" placeholder="Limited mobility, special occasion, fear of water, etc."></textarea>

        <div class="err" id="err"></div>
        <button class="btn" id="btn" onclick="enviar()">Submit</button>
      </div>
    </div>

    <div class="ok" id="ok-pane">
      <div class="ico">✅</div>
      <h2>Thank you!</h2>
      <p>We've got your details. Looking forward to your tour 🌊</p>
    </div>
  </div>

<script>
const SHEET_SYNC_URL = "https://script.google.com/macros/s/AKfycbxN_bxd5yxGWryQ-pMCqudxvN3vos4IibGqJsUofjbFVoRbJO0kw1gyoO2FNRWUYho49Q/exec";

const params = new URLSearchParams(window.location.search);
const tourId = params.get("id");
if (!tourId) {
  document.getElementById("sin-id").style.display = "block";
} else {
  cargarInfoTour();
}

async function cargarInfoTour() {
  try {
    const res = await fetch(SHEET_SYNC_URL + "?action=info_tour&id=" + encodeURIComponent(tourId), { method: "GET" });
    if (!res.ok) return;
    const info = await res.json();
    if (!info) return;

    const box = document.getElementById("info-tour");
    const lineas = [];
    lineas.push("<div style='font-weight:700; margin-bottom:6px;'>🌴 Your tour</div>");
    if (info.tipoLabel) lineas.push("Tour: " + info.tipoLabel);
    if (info.fechaHora) {
      const d = new Date(info.fechaHora);
      lineas.push("Date: " + d.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" }));
      lineas.push("Time: " + d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }));
    }
    if (info.ubicacion) lineas.push("Meeting point: " + info.ubicacion);
    if (info.guiaNombre) lineas.push("Guide: " + info.guiaNombre);
    if (lineas.length <= 1) return;

    box.innerHTML = lineas.join("<br>");
    box.style.display = "block";
  } catch (e) { /* si falla, el formulario sigue funcionando igual */ }
}

function v(id) { return document.getElementById(id).value.trim(); }

const TOURS_AGUA = ["kayaking", "dolphin", "snorkeling"];
const TOURS_ATV = ["atv1", "atv2"];

const PRECIOS = {
  kayaking: { pax: 65 },
  dolphin: { pax: 120 },
  snorkeling: { pax: 90 },
  chocolate: { pax: 80 },
  atv1: { compartido: 140, solo: 190 },
  atv2: { compartido: 120, solo: 180 },
};

function actualizarPrecioEstimado() {
  const tour = v("tour");
  const pax = Number(v("pax")) || 0;
  const box = document.getElementById("precio-estimado");
  const precios = PRECIOS[tour];
  if (!precios) { box.style.display = "none"; return; }

  let texto;
  if (precios.pax) {
    texto = "💵 Price: $" + precios.pax + " per person";
    if (pax > 0) texto += " · Total: $" + (precios.pax * pax);
  } else {
    texto = "💵 Price: $" + precios.compartido + "/person (shared quad) or $" + precios.solo + "/person (private quad)";
  }
  box.textContent = texto;
  box.style.display = "block";
}

function actualizarCamposCondicionales() {
  const tour = v("tour");
  document.getElementById("campo-nadar").style.display = TOURS_AGUA.includes(tour) ? "block" : "none";
  document.getElementById("campo-peso").style.display = TOURS_ATV.includes(tour) ? "block" : "none";
}

const QUE_TRAER = {
  kayaking: ["Swimsuit", "Water shoes or sandals with straps", "Towel", "Reef-safe sunscreen", "Change of clothes", "Waterproof bag for valuables"],
  dolphin: ["Swimsuit", "Water shoes", "Towel", "Reef-safe sunscreen", "Motion sickness medication, if needed", "Waterproof bag for valuables"],
  snorkeling: ["Swimsuit", "Water shoes", "Towel", "Reef-safe sunscreen", "Waterproof bag for valuables"],
  chocolate: ["Comfortable walking shoes", "Swimsuit (for the waterfall)", "Towel", "Insect repellent", "Light rain jacket (optional)"],
  atv1: ["Closed-toe shoes", "Clothes you don't mind getting dirty or wet", "Sunscreen", "Insect repellent", "Swimsuit (for the waterfall stop)"],
  atv2: ["Closed-toe shoes", "Clothes you don't mind getting dirty or wet", "Sunscreen", "Insect repellent", "Swimsuit (for the waterfall stops)"],
};

function actualizarQueTraer() {
  const tour = v("tour");
  const box = document.getElementById("que-traer");
  const lista = QUE_TRAER[tour];
  if (!lista) { box.style.display = "none"; return; }
  box.innerHTML = "<div style='font-weight:700; margin-bottom:6px;'>🎒 What to bring</div><ul style='padding-left:18px; line-height:1.6; margin:0;'>"
    + lista.map(item => "<li>" + item + "</li>").join("") + "</ul>";
  box.style.display = "block";
}

async function enviar() {
  const err = document.getElementById("err");
  err.style.display = "none";

  const huesped = v("huesped");
  if (!huesped) {
    err.textContent = "Please enter the main guest's name.";
    err.style.display = "block";
    return;
  }
  if (!tourId) {
    err.textContent = "This link is missing tour information.";
    err.style.display = "block";
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "⏳ Sending...";

  const detalle = {
    action: "detalles_cliente",
    tourId,
    huesped,
    contacto: v("contacto"),
    tourInteres: v("tour"),
    pax: Number(v("pax")) || "",
    edades: v("edades"),
    nadar: v("nadar"),
    peso: v("peso"),
    idioma: v("idioma"),
    alergias: v("alergias"),
    preferencias: v("preferencias"),
    notas: v("notas"),
    enviado: new Date().toISOString(),
  };

  try {
    await fetch(SHEET_SYNC_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(detalle),
    });
    document.getElementById("form-pane").style.display = "none";
    document.getElementById("ok-pane").style.display = "block";
    window.scrollTo(0, 0);
  } catch (e) {
    err.textContent = "Something went wrong. Please check your connection and try again.";
    err.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Submit";
  }
}
</script>
</body>
</html>
