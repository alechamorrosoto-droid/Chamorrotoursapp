const SHEET_SYNC_URL = "https://script.google.com/macros/s/AKfycbxN_bxd5yxGWryQ-pMCqudxvN3vos4IibGqJsUofjbFVoRbJO0kw1gyoO2FNRWUYho49Q/exec";
function syncTourASheets(tour) {
  try {
    fetch(SHEET_SYNC_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ ...tour, tipoLabel: TIPOS_TOUR[tour.tipo]?.label || tour.tipo })
    });
  } catch (err) { console.warn("No se pudo sincronizar con Sheets:", err); }
}
async function traerLeadsDeSheets() {
  const res = await fetch(SHEET_SYNC_URL + "?action=leads", { method: "GET" });
  if (!res.ok) throw new Error("Respuesta " + res.status);
  const data = await res.json();
  if (!Array.isArray(data)) throw new Error("Formato inesperado");
  return data;
}

// ── RESPALDO / RESTAURACIÓN ──────────────────────────────────────────────────
function exportarRespaldo() {
  const data = {
    version: 1,
    exportado: new Date().toISOString(),
    tours: JSON.parse(localStorage.getItem("chamorro_tours_data") || "null"),
    leads: JSON.parse(localStorage.getItem("chamorro_leads_data") || "[]"),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "ChamorroTours_respaldo_" + new Date().toISOString().split("T")[0] + ".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importarRespaldo(file, onDone) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.tours && !data.leads) throw new Error("Formato no reconocido");
      if (!confirm("Esto reemplazará los datos actuales con el respaldo del " + (data.exportado ? data.exportado.split("T")[0] : "?") + ". ¿Continuar?")) return;
      if (data.tours) localStorage.setItem("chamorro_tours_data", JSON.stringify(data.tours));
      if (data.leads) { localStorage.setItem("chamorro_leads_data", JSON.stringify(data.leads)); localStorage.removeItem("chamorro_leads_eliminados"); }
      onDone();
    } catch (err) { alert("No se pudo leer el respaldo: " + err.message); }
  };
  reader.readAsText(file);
}

function diaSemana(fechaStr) {
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const [y, m, d] = fechaStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dias[dt.getDay()];
}

function compartirWhatsApp(tour) {
  const ti = TIPOS_TOUR[tour.tipo] || TIPOS_TOUR.personalizado;
  const lineas = [
    "🌿 " + tour.guiaNombre + " – " + ti.label.replace(/^\S+ /, "") + " (" + tour.pax + " pax)",
    "📅 " + tour.fecha + " (" + diaSemana(tour.fecha) + ")" + (tour.hora ? " · 🕐 " + tour.hora : ""),
    "👤 Cliente: " + tour.cliente,
    tour.puntoEncuentro ? "📍 Punto de encuentro: " + tour.puntoEncuentro : "",
    tour.contactoCliente ? "📞 Contacto: " + tour.contactoCliente : "",
    ti.duracion ? "⏱ Duración: " + ti.duracion : "",
    tour.notas ? "\n" + tour.notas : "",
  ].filter(Boolean);
  const url = "https://wa.me/?text=" + encodeURIComponent(lineas.join("\n"));
  window.open(url, "_blank");
}

const MESES_NOMBRES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function crearMes(year, month) {
  return { label: MESES_NOMBRES[month - 1] + " " + year, year, month, tours: [] };
}
function mesKeyDe(year, month) { return year + "-" + String(month).padStart(2, "0"); }
// Garantiza que exista una pestaña de mes desde `atras` meses antes de hoy hasta `adelante` meses después,
// sin borrar ni sobreescribir meses que ya tengan datos guardados.
function asegurarRangoMeses(base, atras = 3, adelante = 12) {
  let out = { ...base };
  const hoy = new Date();
  for (let i = -atras; i <= adelante; i++) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
    const key = mesKeyDe(d.getFullYear(), d.getMonth() + 1);
    if (!out[key]) out[key] = crearMes(d.getFullYear(), d.getMonth() + 1);
  }
  return out;
}

function fmt(n) {
  if (!n && n !== 0) return "—";
  return "$" + Number(n).toLocaleString("es-CR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function getDiasCalendario(year, month) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const totalDays = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);
  return cells;
}

function calcTour(f, tipoKey) {
  const tipo = TIPOS_TOUR[tipoKey] || {};
  let ingreso = 0, paxTotal = 0;
  if (tipo.esAtv) {
    const compartido = Number(f.paxCompartido) || 0;
    const solo = Number(f.paxSolo) || 0;
    ingreso = compartido * Number(f.precioPax || tipo.precioPax || 0) + solo * Number(f.precioSolo || tipo.precioSolo || 0);
    paxTotal = compartido + solo;
  } else {
    paxTotal = Number(f.pax) || 0;
    ingreso = paxTotal * (Number(f.precioPax) || 0);
  }
  const comisionUSD = ingreso * ((Number(f.comisionPct) || 0) / 100);
  const gastosItems = COLS_GASTOS.reduce((s, k) => s + (Number(f[k]) || 0), 0);
  const gastoTotal = gastosItems + (Number(f.pagoGuia) || 0) + comisionUSD;
  return { ingreso, comisionUSD, gastoTotal, ganancia: ingreso - gastoTotal, paxTotal };
}

async function exportarExcel(meses) {
  const wb = new ExcelJS.Workbook();
  const COLS = [
    { header: "Fecha", key: "fecha", width: 12 },
    { header: "Cliente", key: "cliente", width: 20 },
    { header: "Pax", key: "pax", width: 6 },
    { header: "Precio/Pax", key: "precioPax", width: 12 },
    { header: "Ingreso", key: "ingreso", width: 12 },
    { header: "Comisión %", key: "comisionPct", width: 10 },
    { header: "Comisión $", key: "comisionUSD", width: 12 },
    { header: "Pago Guía", key: "pagoGuia", width: 12 },
    { header: "Guía", key: "guiaNombre", width: 18 },
    { header: "Fruta", key: "fruta", width: 9 },
    { header: "Transporte", key: "transporte", width: 12 },
    { header: "Kayaks", key: "kayaks", width: 9 },
    { header: "Entradas", key: "entradas", width: 10 },
    { header: "Otros", key: "otros", width: 9 },
    { header: "Gasto Total", key: "gastoTotal", width: 12 },
    { header: "Ganancia", key: "ganancia", width: 12 },
    { header: "Estado Pago", key: "estadoPago", width: 12 },
    { header: "Tipo Tour", key: "tipoTour", width: 20 },
  ];
  const MONEY_KEYS = ["precioPax","ingreso","comisionUSD","pagoGuia","fruta","transporte","kayaks","entradas","otros","gastoTotal","ganancia"];

  let huboDatos = false;
  Object.values(meses).forEach(({ label, tours }) => {
    if (!tours.length) return;
    huboDatos = true;
    const ws = wb.addWorksheet(label, { views: [{ state: "frozen", ySplit: 1 }] });
    ws.columns = COLS;

    ws.getRow(1).eachCell(cell => {
      cell.font = { bold: true, color: { argb: "FFFFFFFF" } };
      cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FF0369A1" } };
      cell.alignment = { vertical: "middle", horizontal: "center" };
    });

    tours.forEach((t, i) => {
      const row = ws.addRow({
        fecha: t.fecha, cliente: t.cliente, pax: t.pax, precioPax: t.precioPax,
        ingreso: t.ingreso, comisionPct: t.comisionPct, comisionUSD: t.comisionUSD,
        pagoGuia: t.pagoGuia||0, guiaNombre: t.guiaNombre, fruta: t.fruta||0,
        transporte: t.transporte||0, kayaks: t.kayaks||0, entradas: t.entradas||0,
        otros: t.otros||0, gastoTotal: t.gastoTotal, ganancia: t.ganancia,
        estadoPago: t.estadoPago || "Pendiente",
        tipoTour: TIPOS_TOUR[t.tipo]?.label || t.tipo
      });
      if (i % 2 === 1) row.eachCell(cell => { cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFF1F8FF" } }; });
      row.getCell("ganancia").font = { bold: true, color: { argb: t.ganancia >= 0 ? "FF15803D" : "FFDC2626" } };
      MONEY_KEYS.forEach(k => { row.getCell(k).numFmt = "$#,##0.00"; });
      row.getCell("comisionPct").numFmt = '0"%"';
    });

    const tot = tours.reduce((a,t) => ({ ingreso: a.ingreso+t.ingreso, gastoTotal: a.gastoTotal+t.gastoTotal, ganancia: a.ganancia+t.ganancia, comisionUSD: a.comisionUSD+t.comisionUSD, pagoGuia: a.pagoGuia+(t.pagoGuia||0) }), { ingreso:0, gastoTotal:0, ganancia:0, comisionUSD:0, pagoGuia:0 });
    const totalRow = ws.addRow({ fecha: "TOTAL DEL MES", ingreso: tot.ingreso, comisionUSD: tot.comisionUSD, pagoGuia: tot.pagoGuia, gastoTotal: tot.gastoTotal, ganancia: tot.ganancia });
    totalRow.eachCell({ includeEmpty: true }, cell => {
      cell.font = { bold: true };
      cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFC8E6C9" } };
      cell.border = { top: { style: "thin", color: { argb: "FF1B5E20" } } };
    });
    MONEY_KEYS.forEach(k => { totalRow.getCell(k).numFmt = "$#,##0.00"; });

    ws.eachRow(row => row.eachCell({ includeEmpty: true }, cell => {
      cell.border = { ...(cell.border||{}), bottom: { style: "hair", color: { argb: "FFE2E8F0" } } };
    }));
  });

  if (!huboDatos) return alert("No hay tours para exportar.");
  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "Chamorro_Tours_2026.xlsx";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
