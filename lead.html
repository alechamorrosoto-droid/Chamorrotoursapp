<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chamorro Tours · Solicitud de Tour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070f16; font-family: -apple-system, 'Inter', system-ui, sans-serif; color: #e8f4f8; min-height: 100vh; padding-bottom: 40px; }
    .header { background: #0a1a24; border-bottom: 1px solid #1e3a4a; padding: 20px 16px; display: flex; align-items: center; gap: 12px; }
    .logo { width: 42px; height: 42px; border-radius: 10px; background: linear-gradient(135deg,#0ea5e9,#0369a1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .header h1 { font-size: 17px; font-weight: 800; }
    .header p { font-size: 12px; color: #7ec8e3; margin-top: 2px; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
    .intro { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
    label { font-size: 11px; color: #7ec8e3; display: block; margin-bottom: 4px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    label .req { color: #f87171; }
    input, select, textarea { width: 100%; background: #0f2027; border: 1px solid #2d5a80; border-radius: 8px; padding: 11px 12px; color: #e8f4f8; font-size: 15px; font-family: inherit; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #0ea5e9; }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: flex; flex-direction: column; }
    .btn { width: 100%; margin-top: 24px; background: linear-gradient(135deg,#0ea5e9,#0369a1); color: #fff; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:disabled { opacity: 0.5; }
    .ok { display: none; text-align: center; padding: 60px 20px; }
    .ok .ico { font-size: 52px; margin-bottom: 16px; }
    .ok h2 { font-size: 19px; margin-bottom: 8px; }
    .ok p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .ok button { margin-top: 24px; background: transparent; border: 1px solid #1e4060; color: #7ec8e3; border-radius: 8px; padding: 11px 20px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .err { display: none; background: #2a1215; border: 1px solid #7f1d1d; color: #f87171; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 14px; }
    .warn { display: none; background: #2a2010; border: 1px solid #78350f; color: #f59e0b; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 14px; text-align: left; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🌊</div>
    <div>
      <h1>Chamorro Tours</h1>
      <p>Solicitud de tour para huéspedes</p>
    </div>
  </div>

  <div class="wrap">
    <div id="form-pane">
      <p class="intro">Completa los datos del huésped interesado y nos pondremos en contacto para coordinar el tour. Los campos con <span style="color:#f87171">*</span> son requeridos.</p>

      <label>Nombre del huésped / grupo <span class="req">*</span></label>
      <input type="text" id="huesped" placeholder="Ej: Familia Smith" />

      <label>Villa / Unidad</label>
      <input type="text" id="unidad" placeholder="Ej: Villa 4" />

      <label>Contacto del huésped o tuyo (teléfono/WhatsApp)</label>
      <input type="text" id="contacto" placeholder="Ej: +506 8888-8888" />

      <label>Fecha tentativa del tour</label>
      <input type="date" id="fecha" />

      <label>Tour de interés</label>
      <select id="tour">
        <option value="">Aún no deciden</option>
        <option value="kayaking">🚣 Kayaking</option>
        <option value="dolphin">🐬 Dolphin Tour</option>
        <option value="snorkeling">🤿 Snorkeling</option>
        <option value="chocolate">🍫 Chocolate & Waterfalls</option>
        <option value="atv1">🏍 ATV 1 Catarata</option>
        <option value="atv2">🏍 ATV 2 Cataratas</option>
        <option value="personalizado">✏️ Otro / Personalizado</option>
      </select>

      <label># de personas</label>
      <input type="number" id="pax" min="1" placeholder="4" />

      <label>Edades del grupo</label>
      <input type="text" id="edades" placeholder="Ej: 2 adultos, niños de 8 y 12" />

      <label>Idioma</label>
      <select id="idioma">
        <option>Español</option>
        <option>Inglés</option>
        <option>Portugués</option>
        <option>Francés</option>
        <option>Otro</option>
      </select>

      <label>🚨 Alergias</label>
      <input type="text" id="alergias" placeholder="Ninguna conocida" />

      <label>Preferencias alimenticias</label>
      <input type="text" id="preferencias" placeholder="Vegetariano, sin gluten, etc." />

      <label>Notas adicionales</label>
      <textarea id="notas" placeholder="Horario preferido, movilidad reducida, celebración especial, etc."></textarea>

      <label>Tu nombre (quien envía)</label>
      <input type="text" id="remitente" placeholder="Ej: Diana" />

      <div class="err" id="err"></div>
      <div class="warn" id="warn"></div>
      <button class="btn" id="btn" onclick="enviar()">Enviar solicitud 🌿</button>
    </div>

    <div class="ok" id="ok-pane">
      <div class="ico">✅</div>
      <h2>¡Solicitud enviada!</h2>
      <p id="ok-msg">Gracias. Alejandro recibirá la información y se pondrá en contacto para coordinar el tour.</p>
      <button onclick="reiniciar()">Enviar otra solicitud</button>
    </div>
  </div>

<script>
const SHEET_SYNC_URL = "https://script.google.com/macros/s/AKfycbxN_bxd5yxGWryQ-pMCqudxvN3vos4IibGqJsUofjbFVoRbJO0kw1gyoO2FNRWUYho49Q/exec";

function v(id) { return document.getElementById(id).value.trim(); }

async function confirmarEnvio(id, intentos = 4) {
  for (let i = 0; i < intentos; i++) {
    await new Promise(r => setTimeout(r, 1200));
    try {
      const res = await fetch(SHEET_SYNC_URL + "?action=leads", { method: "GET" });
      if (!res.ok) continue;
      const data = await res.json();
      if (Array.isArray(data) && data.some(l => String(l.id) === String(id))) return true;
    } catch (e) { /* seguimos intentando */ }
  }
  return false;
}

async function enviar() {
  const err = document.getElementById("err");
  const warn = document.getElementById("warn");
  err.style.display = "none";
  warn.style.display = "none";

  const huesped = v("huesped"), fecha = v("fecha"), pax = v("pax");
  if (!huesped) {
    err.textContent = "Por favor completa al menos el nombre del huésped o grupo.";
    err.style.display = "block";
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "⏳ Enviando...";

  const id = Date.now();
  const lead = {
    action: "lead",
    id,
    propertyManagement: "Casas del Caribe",
    huesped, fecha,
    unidad: v("unidad"),
    contacto: v("contacto"),
    tourInteres: v("tour"),
    pax: Number(pax) || 0,
    edades: v("edades"),
    idioma: v("idioma"),
    alergias: v("alergias"),
    preferencias: v("preferencias"),
    notas: v("notas"),
    remitente: v("remitente"),
    estado: "Pendiente",
    enviado: new Date().toISOString(),
  };

  try {
    await fetch(SHEET_SYNC_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(lead),
    });

    btn.textContent = "⏳ Confirmando...";
    const confirmado = await confirmarEnvio(id);

    const okMsg = document.getElementById("ok-msg");
    if (confirmado) {
      okMsg.textContent = "Gracias. Alejandro recibirá la información y se pondrá en contacto para coordinar el tour.";
    } else {
      okMsg.textContent = "Tu solicitud se envió, pero no pudimos confirmar que llegara a la hoja de Alejandro. Por favor avísale directamente por WhatsApp para asegurar que la vea.";
    }
    document.getElementById("form-pane").style.display = "none";
    document.getElementById("ok-pane").style.display = "block";
    window.scrollTo(0, 0);
  } catch (e) {
    err.textContent = "No se pudo enviar. Revisa tu conexión e intenta de nuevo.";
    err.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Enviar solicitud 🌿";
  }
}

function reiniciar() {
  ["huesped","unidad","contacto","fecha","tour","pax","edades","alergias","preferencias","notas","remitente"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("ok-pane").style.display = "none";
  document.getElementById("form-pane").style.display = "block";
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
